<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Бронирование массажа</title>
<style>
*,*::before,*::after{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#222;min-height:100vh}
nav{background:#2d7d46;padding:12px 20px;display:flex;gap:16px;align-items:center;flex-wrap:wrap}
nav h1{margin:0;color:#fff;font-size:1.2rem;flex:1}
nav button{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 16px;border-radius:6px;cursor:pointer;font-size:.9rem}
nav button:hover{background:rgba(255,255,255,.3)}
nav button.active{background:#fff;color:#2d7d46;border-color:#fff}
.container{max-width:900px;margin:0 auto;padding:20px}
.section{display:none}
.section.active{display:block}

.calendar-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px}
.calendar-nav h2{margin:0;font-size:1.3rem}
.calendar-nav button{background:#2d7d46;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;font-size:1rem}
.calendar-nav button:hover{background:#236838}
.legend{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;font-size:.85rem}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-dot{width:14px;height:14px;border-radius:3px;display:inline-block}
.legend-dot.available{background:#4caf50}
.legend-dot.booked{background:#9e9e9e}
.legend-dot.past{background:#e0e0e0}

.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-header{text-align:center;font-weight:600;font-size:.8rem;padding:6px 0;color:#666}
.day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:.95rem;cursor:default;transition:.15s;position:relative;min-height:50px;user-select:none}
.day-cell.available{background:#4caf50;color:#fff;cursor:pointer}
.day-cell.available:hover{background:#388e3c;transform:scale(1.05)}
.day-cell.booked{background:#9e9e9e;color:#fff}
.day-cell.past{background:#e0e0e0;color:#aaa}
.day-cell.empty{background:transparent;cursor:default}
.day-cell.today{font-weight:700;box-shadow:inset 0 0 0 2px #2d7d46}
.day-cell .slot-count{position:absolute;bottom:2px;right:4px;font-size:.6rem;opacity:.8}

.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;padding:16px}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h3{margin:0 0 16px;font-size:1.2rem}
.modal p{margin:0 0 16px;color:#555;font-size:.95rem}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:4px;font-size:.9rem;color:#444}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:1rem;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#2d7d46;box-shadow:0 0 0 2px rgba(45,125,70,.2)}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions button{flex:1;padding:10px;border-radius:6px;cursor:pointer;font-size:1rem;font-family:inherit;border:none}
.btn-submit{background:#2d7d46;color:#fff}
.btn-submit:hover{background:#236838}
.btn-submit:disabled{opacity:.6;cursor:not-allowed}
.btn-cancel{background:#e0e0e0;color:#333}
.btn-cancel:hover{background:#ccc}
.error-msg{color:#d32f2f;font-size:.85rem;margin-top:6px;display:none}
.loading-msg{text-align:center;color:#888;padding:20px}

.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;color:#fff;font-size:.9rem;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .3s ease;max-width:360px}
.toast.success{background:#2d7d46}
.toast.error{background:#d32f2f}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.admin-login{max-width:360px;margin:60px auto;text-align:center}
.admin-login h2{margin-bottom:20px}
.admin-login input{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:1rem;margin-bottom:12px}
.admin-login button{background:#2d7d46;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:1rem}
.admin-login button:hover{background:#236838}

.admin-panel h2{margin-bottom:16px}
.admin-table-wrap{overflow-x:auto}
.admin-table{width:100%;border-collapse:collapse;font-size:.9rem}
.admin-table th,.admin-table td{padding:10px 12px;text-align:left;border-bottom:1px solid #e0e0e0;white-space:nowrap}
.admin-table th{background:#f0f0f0;font-weight:600}
.admin-table tr:hover{background:#f9f9f9}
.status-confirmed{color:#2d7d46;font-weight:600}
.status-pending{color:#f57c00;font-weight:600}
.admin-actions{display:flex;gap:6px}
.admin-actions button{padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:.8rem}
.btn-confirm{background:#4caf50;color:#fff}
.btn-confirm:hover{background:#388e3c}
.btn-delete{background:#d32f2f;color:#fff}
.btn-delete:hover{background:#b71c1c}

@media(max-width:600px){
  .container{padding:12px}
  .calendar-grid{gap:2px}
  .day-cell{min-height:40px;font-size:.8rem}
  .day-header{font-size:.7rem;padding:4px 0}
  .modal{padding:16px}
  .admin-table{font-size:.8rem}
  .admin-table th,.admin-table td{padding:6px 8px}
  nav{padding:10px 12px}
  nav h1{font-size:1rem}
}
</style>
</head>
<body>

<nav>
  <h1>Бронирование массажа</h1>
  <button id="nav-main" class="active" onclick="showView('main')">Главная</button>
  <button id="nav-admin" onclick="showView('admin')">Админ</button>
</nav>

<div class="container">

<div id="main-section" class="section active">
  <div class="calendar-nav">
    <button onclick="prevMonth()">&larr;</button>
    <h2 id="month-label"></h2>
    <button onclick="nextMonth()">&rarr;</button>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot available"></span> Свободно</span>
    <span class="legend-item"><span class="legend-dot booked"></span> Занято</span>
    <span class="legend-item"><span class="legend-dot past"></span> Прошедшие</span>
  </div>
  <div id="calendar" class="calendar-grid"></div>
  <div id="calendar-loading" class="loading-msg">Загрузка...</div>
</div>

<div id="admin-section" class="section">
  <div id="admin-login" class="admin-login">
    <h2>Вход для администратора</h2>
    <input type="password" id="admin-password-input" placeholder="Пароль" onkeydown="if(event.key==='Enter')adminLogin()">
    <button onclick="adminLogin()">Войти</button>
    <p id="admin-login-error" style="color:#d32f2f;display:none;margin-top:10px"></p>
  </div>
  <div id="admin-panel" class="admin-panel" style="display:none">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <h2 style="margin:0">Все брони</h2>
      <button class="btn-change-pw" onclick="showChangePassword()" style="background:#e0e0e0;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem">Сменить пароль</button>
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ФИО</th><th>Телефон</th><th>Дата</th><th>Время</th><th>Статус</th><th>Действия</th>
          </tr>
        </thead>
        <tbody id="admin-table-body"></tbody>
      </table>
    </div>
    <p id="admin-loading" class="loading-msg" style="display:none">Загрузка...</p>
  </div>
</div>

</div>

<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Запись на массаж</h3>
    <p id="modal-date-info"></p>
    <div class="form-group">
      <label for="modal-name">ФИО</label>
      <input type="text" id="modal-name" placeholder="Иванов Иван Иванович">
    </div>
    <div class="form-group">
      <label for="modal-phone">Телефон</label>
      <div style="display:flex;align-items:center;border:1px solid #ccc;border-radius:6px;overflow:hidden">
        <span style="padding:10px 0 10px 12px;color:#555;background:#f5f5f5;font-size:1rem;user-select:none">+7</span>
        <input type="tel" id="modal-phone" placeholder="(xxx)-xxx-xx-xx" style="border:none;border-radius:0;flex:1" oninput="maskPhone(this)">
      </div>
    </div>
    <div class="form-group">
      <label for="modal-time">Время</label>
      <select id="modal-time"><option value="">Загрузка...</option></select>
    </div>
    <p class="error-msg" id="modal-error"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-submit" id="modal-submit" onclick="submitBooking()">Записаться</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="pw-modal-overlay" onclick="if(event.target===this)closePwModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Смена пароля администратора</h3>
    <div class="form-group">
      <label for="pw-current">Текущий пароль</label>
      <input type="password" id="pw-current" placeholder="Текущий пароль">
    </div>
    <div class="form-group">
      <label for="pw-new">Новый пароль</label>
      <input type="password" id="pw-new" placeholder="Новый пароль (мин. 4 символа)">
    </div>
    <div class="form-group">
      <label for="pw-confirm">Подтвердите новый пароль</label>
      <input type="password" id="pw-confirm" placeholder="Повторите новый пароль">
    </div>
    <p class="error-msg" id="pw-error"></p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePwModal()">Отмена</button>
      <button class="btn-submit" id="pw-submit" onclick="submitChangePassword()">Сменить</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const DAY_NAMES = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];

const state = {
  year: new Date().getFullYear(),
  month: new Date().getMonth() + 1,
  adminPassword: null,
};

function daysInMonth(y,m){return new Date(y,m,0).getDate()}
function firstWeekday(y,m){const d=new Date(y,m-1,1).getDay();return d===0?6:d-1}
function pad(n){return n.toString().padStart(2,'0')}
function todayStr(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}

function maskPhone(el){
  let d=el.value.replace(/\D/g,'');
  if(d.startsWith('7'))d=d.slice(1);
  if(d.length>10)d=d.slice(0,10);
  let r='';
  if(d.length>0)r='('+d.slice(0,3);
  if(d.length>3)r+=')-'+d.slice(3,6);
  if(d.length>6)r+='-'+d.slice(6,8);
  if(d.length>8)r+='-'+d.slice(8);
  el.value=r;
}

function showView(view){
  document.getElementById('main-section').classList.toggle('active',view==='main');
  document.getElementById('admin-section').classList.toggle('active',view==='admin');
  document.getElementById('nav-main').classList.toggle('active',view==='main');
  document.getElementById('nav-admin').classList.toggle('active',view==='admin');
  const url=view==='admin'?'/admin':'/';
  history.pushState(null,'',url);
  if(view==='admin'){
    if(state.adminPassword)loadAdminPanel();
  }else{
    renderCalendar();
  }
}

function initView(){
  const path=window.location.pathname;
  if(path==='/admin')showView('admin');
  else showView('main');
}

async function fetchJSON(url, opts){
  const r=await fetch(url, opts);
  if(!r.ok){const e=await r.json().catch(()=>({detail:'Ошибка сервера'}));throw new Error(e.detail||'Ошибка сервера')}
  return r.json()
}

function showToast(msg,type){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+type;
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300)},3000)
}

async function renderCalendar(){
  const el=document.getElementById('calendar');
  const loading=document.getElementById('calendar-loading');
  loading.style.display='block';
  document.getElementById('month-label').textContent=MONTHS[state.month-1]+' '+state.year;

  try{
    const data=await fetchJSON(`/api/calendar?year=${state.year}&month=${state.month}`);
    loading.style.display='none';
    renderCalendarGrid(data.days);
  }catch(e){
    loading.textContent='Ошибка загрузки календаря';
    showToast(e.message,'error');
  }
}

function renderCalendarGrid(days){
  const el=document.getElementById('calendar');
  el.innerHTML='';

  DAY_NAMES.forEach(n=>{
    const d=document.createElement('div');
    d.className='day-header';
    d.textContent=n;
    el.appendChild(d);
  });

  const fw=firstWeekday(state.year,state.month);
  for(let i=0;i<fw;i++){
    const d=document.createElement('div');
    d.className='day-cell empty';
    el.appendChild(d);
  }

  const dim=daysInMonth(state.year,state.month);
  const today=todayStr();

  for(let day=1;day<=dim;day++){
    const cell=document.createElement('div');
    const key=String(day);
    const info=days[key];
    const dateStr=state.year+'-'+pad(state.month)+'-'+pad(day);

    if(info.is_past){
      cell.className='day-cell past';
    }else if(info.is_full){
      cell.className='day-cell booked';
      cell.title='Нет свободных мест';
    }else{
      cell.className='day-cell available';
      cell.dataset.date=dateStr;
      cell.addEventListener('click',()=>openBooking(dateStr,info.slots_remaining));
    }

    if(dateStr===today)cell.classList.add('today');
    cell.textContent=day;
    if(info&&!info.is_past&&info.slots_remaining>0&&info.slots_remaining<=3){
      const badge=document.createElement('span');
      badge.className='slot-count';
      badge.textContent='+'+info.slots_remaining;
      cell.appendChild(badge);
    }
    el.appendChild(cell);
  }
}

function prevMonth(){
  state.month--;
  if(state.month<1){state.month=12;state.year--}
  renderCalendar()
}

function nextMonth(){
  state.month++;
  if(state.month>12){state.month=1;state.year++}
  renderCalendar()
}

async function openBooking(dateStr,slotsRemaining){
  document.getElementById('modal-date-info').textContent='Дата: '+dateStr;
  document.getElementById('modal-name').value='';
  document.getElementById('modal-phone').value='';
  document.getElementById('modal-phone').focus();
  document.getElementById('modal-error').style.display='none';
  document.getElementById('modal-submit').disabled=true;
  document.getElementById('modal-submit').textContent='Загрузка...';
  document.getElementById('modal-overlay').classList.add('active');

  const sel=document.getElementById('modal-time');
  sel.innerHTML='<option value="">Загрузка...</option>';

  try{
    const data=await fetchJSON(`/api/available-slots?date_str=${dateStr}`);
    sel.innerHTML='<option value="">Выберите время</option>';
    data.available_slots.forEach(t=>{
      const opt=document.createElement('option');
      opt.value=t;
      opt.textContent=t;
      sel.appendChild(opt);
    });
    document.getElementById('modal-submit').disabled=false;
    document.getElementById('modal-submit').textContent='Записаться';
    if(data.available_slots.length===0){
      sel.innerHTML='<option value="">Нет свободных слотов</option>';
      document.getElementById('modal-submit').disabled=true;
    }
  }catch(e){
    sel.innerHTML='<option value="">Ошибка загрузки</option>';
    showToast(e.message,'error');
    document.getElementById('modal-submit').disabled=false;
    document.getElementById('modal-submit').textContent='Записаться';
  }
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('active')
}

async function submitBooking(){
  const name=document.getElementById('modal-name').value.trim();
  const rawPhone=document.getElementById('modal-phone').value.replace(/\D/g,'');
  const phone='+7'+rawPhone;
  const time=document.getElementById('modal-time').value;
  const dateText=document.getElementById('modal-date-info').textContent.replace('Дата: ','');
  const errEl=document.getElementById('modal-error');

  if(!name){errEl.textContent='Укажите ФИО';errEl.style.display='block';return}
  if(!rawPhone||rawPhone.length<10){errEl.textContent='Укажите телефон полностью';errEl.style.display='block';return}
  if(!time){errEl.textContent='Выберите время';errEl.style.display='block';return}

  errEl.style.display='none';
  const btn=document.getElementById('modal-submit');
  btn.disabled=true;
  btn.textContent='Отправка...';

  try{
    await fetchJSON('/api/book',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({full_name:name,phone:phone,date:dateText,time:time}),
    });
    closeModal();
    showToast('Запись успешно создана!','success');
    renderCalendar();
  }catch(e){
    errEl.textContent=e.message;
    errEl.style.display='block';
    btn.disabled=false;
    btn.textContent='Записаться';
  }
}

function adminLogin(){
  const pw=document.getElementById('admin-password-input').value;
  const errEl=document.getElementById('admin-login-error');
  if(!pw){errEl.textContent='Введите пароль';errEl.style.display='block';return}
  state.adminPassword=pw;
  loadAdminPanel();
}

async function loadAdminPanel(){
  document.getElementById('admin-login').style.display='none';
  document.getElementById('admin-panel').style.display='block';
  const loading=document.getElementById('admin-loading');
  const tbody=document.getElementById('admin-table-body');
  loading.style.display='block';
  tbody.innerHTML='';

  try{
    const data=await fetchJSON(`/api/admin/bookings?password=${encodeURIComponent(state.adminPassword)}`);
    loading.style.display='none';
    if(data.bookings.length===0){
      tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:#888;padding:20px">Нет броней</td></tr>';
      return;
    }
    data.bookings.forEach(b=>{
      const tr=document.createElement('tr');
      const confirmed=!!b.is_confirmed;
      tr.innerHTML=`
        <td>${escapeHtml(b.full_name)}</td>
        <td>${escapeHtml(b.phone)}</td>
        <td>${b.appointment_date}</td>
        <td>${b.appointment_time}</td>
        <td class="${confirmed?'status-confirmed':'status-pending'}">${confirmed?'Подтверждено':'Не подтверждено'}</td>
        <td>
          <div class="admin-actions">
            ${confirmed?'':'<button class="btn-confirm" onclick="adminConfirm('+b.id+')">Подтвердить</button>'}
            <button class="btn-delete" onclick="adminDelete(${b.id})">Отменить</button>
          </div>
        </td>
      `;
      tbody.appendChild(tr);
    });
  }catch(e){
    loading.style.display='none';
    if(e.message==='Неверный пароль'){
      document.getElementById('admin-login').style.display='block';
      document.getElementById('admin-panel').style.display='none';
      const errEl=document.getElementById('admin-login-error');
      errEl.textContent='Неверный пароль';
      errEl.style.display='block';
      state.adminPassword=null;
    }else{
      showToast(e.message,'error');
    }
  }
}

async function adminConfirm(id){
  try{
    await fetchJSON(`/api/admin/confirm/${id}?password=${encodeURIComponent(state.adminPassword)}`,{method:'POST'});
    showToast('Бронь подтверждена','success');
    loadAdminPanel();
  }catch(e){showToast(e.message,'error')}
}

async function adminDelete(id){
  if(!confirm('Удалить бронь?'))return;
  try{
    await fetchJSON(`/api/admin/delete/${id}?password=${encodeURIComponent(state.adminPassword)}`,{method:'DELETE'});
    showToast('Бронь отменена','success');
    loadAdminPanel();
  }catch(e){showToast(e.message,'error')}
}

function showChangePassword(){
  document.getElementById('pw-current').value='';
  document.getElementById('pw-new').value='';
  document.getElementById('pw-confirm').value='';
  document.getElementById('pw-error').style.display='none';
  document.getElementById('pw-submit').disabled=false;
  document.getElementById('pw-submit').textContent='Сменить';
  document.getElementById('pw-modal-overlay').classList.add('active');
}

function closePwModal(){
  document.getElementById('pw-modal-overlay').classList.remove('active');
}

async function submitChangePassword(){
  const cur=document.getElementById('pw-current').value;
  const p1=document.getElementById('pw-new').value;
  const p2=document.getElementById('pw-confirm').value;
  const errEl=document.getElementById('pw-error');

  if(!cur){errEl.textContent='Введите текущий пароль';errEl.style.display='block';return}
  if(!p1){errEl.textContent='Введите новый пароль';errEl.style.display='block';return}
  if(p1.length<4){errEl.textContent='Минимум 4 символа';errEl.style.display='block';return}
  if(p1!==p2){errEl.textContent='Пароли не совпадают';errEl.style.display='block';return}

  errEl.style.display='none';
  const btn=document.getElementById('pw-submit');
  btn.disabled=true;
  btn.textContent='Сохранение...';

  try{
    const data=await fetchJSON('/api/admin/change-password',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({current_password:cur,new_password:p1}),
    });
    closePwModal();
    showToast('Пароль успешно изменён','success');
    state.adminPassword=p1;
  }catch(e){
    errEl.textContent=e.message;
    errEl.style.display='block';
    btn.disabled=false;
    btn.textContent='Сменить';
  }
}

function escapeHtml(s){
  const d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML
}

window.addEventListener('popstate',()=>initView());
initView();
</script>
